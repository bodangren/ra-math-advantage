name: Monorepo CI Matrix

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'measure/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'measure/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Phase 1: Package validation (runs in parallel)
  packages:
    name: Validate Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - activity-runtime
          - ai-tutoring
          - component-approval
          - core-auth
          - core-convex
          - graphing-core
          - practice-core
          - practice-test-engine
          - srs-engine
          - study-hub-core
          - teacher-reporting-core
          - workbook-pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run package tests
        run: npm run test --workspace=packages/${{ matrix.package }}

      - name: Run package typecheck
        run: npm run typecheck --workspace=packages/${{ matrix.package }}

      - name: Run package lint
        run: npm run lint --workspace=packages/${{ matrix.package }}

  # Phase 2: Boundary guard checks (runs after packages)
  boundary-check:
    name: Boundary Guard Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run monorepo boundary check
        run: node scripts/check-monorepo-boundaries.mjs
        env:
          CI: true

  # Phase 3: IM3 app gates
  im3:
    name: IM3 App Gates
    runs-on: ubuntu-latest
    needs: [packages, boundary-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IM3 lint
        run: npm run lint --prefix apps/integrated-math-3
        env:
          CI: true

      - name: Run IM3 tests
        run: npm test --prefix apps/integrated-math-3
        env:
          CI: true

      - name: Run IM3 typecheck
        run: cd apps/integrated-math-3 && npx tsc --noEmit
        env:
          CI: true

      - name: Run IM3 build
        run: npm run build --prefix apps/integrated-math-3
        env:
          CI: true

      - name: Run IM3 bundle size audit
        run: npm run bundle-size:audit --prefix apps/integrated-math-3
        env:
          CI: true

  # Phase 4: BM2 app gates
  # BM2 TypeScript errors and governance test failures resolved (review-18).
  # All BM2 gates now block CI on failure.
  bm2:
    name: BM2 App Gates
    runs-on: ubuntu-latest
    needs: [packages, boundary-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run BM2 lint
        run: npm run lint --workspace=apps/bus-math-v2
        env:
          CI: true

      - name: Run BM2 tests
        run: npm run test --workspace=apps/bus-math-v2
        env:
          CI: true

      - name: Run BM2 build
        run: npm run build --workspace=apps/bus-math-v2
        env:
          CI: true

      - name: Run BM2 typecheck
        run: cd apps/bus-math-v2 && npx tsc --noEmit
        env:
          CI: true

      - name: Run BM2 bundle size audit
        run: npm run bundle:audit --workspace=apps/bus-math-v2
        env:
          CI: true

  # Phase 5: IM1, IM2, PreCalc lint/typecheck/build gates
  # Test gates are deferred due to pre-existing test failures (Convex provider tests).
  im1:
    name: IM1 App Gates
    runs-on: ubuntu-latest
    needs: [packages, boundary-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IM1 lint
        run: npm run lint --prefix apps/integrated-math-1
        env:
          CI: true

      - name: Run IM1 typecheck
        run: cd apps/integrated-math-1 && npx tsc --noEmit
        env:
          CI: true

      - name: Run IM1 build
        run: npm run build --prefix apps/integrated-math-1
        env:
          CI: true

  im2:
    name: IM2 App Gates
    runs-on: ubuntu-latest
    needs: [packages, boundary-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IM2 lint
        run: npm run lint --prefix apps/integrated-math-2
        env:
          CI: true

      - name: Run IM2 typecheck
        run: cd apps/integrated-math-2 && npx tsc --noEmit
        env:
          CI: true

      - name: Run IM2 build
        run: npm run build --prefix apps/integrated-math-2
        env:
          CI: true

  precalc:
    name: PreCalc App Gates
    runs-on: ubuntu-latest
    needs: [packages, boundary-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run PreCalc lint
        run: npm run lint --prefix apps/pre-calculus
        env:
          CI: true

      - name: Run PreCalc typecheck
        run: cd apps/pre-calculus && npx tsc --noEmit
        env:
          CI: true

      - name: Run PreCalc build
        run: npm run build --prefix apps/pre-calculus
        env:
          CI: true

  # Phase 6: Deploy (only on main/master push, after IM3 and BM2 gates pass)
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [im3, bm2]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IM3 build
        run: npm run build --workspace=apps/integrated-math-3
        env:
          CI: true

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc
          env: production
          workingDirectory: apps/integrated-math-3

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Cloudflare deployment failed. Check the logs above."