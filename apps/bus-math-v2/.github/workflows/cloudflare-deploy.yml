name: Cloudflare Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'conductor/**'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: apps/bus-math-v2

      - name: Run lint
        run: npm run lint
        working-directory: apps/bus-math-v2
        env:
          CI: true

      - name: Run tests
        run: npm test
        working-directory: apps/bus-math-v2
        env:
          CI: true

      - name: Run build
        run: npm run build
        working-directory: apps/bus-math-v2
        env:
          CI: true

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.jsonc
          env: production
          workingDirectory: apps/bus-math-v2

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Cloudflare deployment failed. Check the logs above."